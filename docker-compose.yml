version: '3.8'

services:

  postgres-db:
    image: postgres
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: taxi_user
      POSTGRES_PASSWORD: taxi_pass
      POSTGRES_DB: taxi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  user-service:
    build: ./backend/user-service
    container_name: user-service
    ports:
      - "8000:8000"
    depends_on:
      - postgres-db

volumes:
  postgres_data:
